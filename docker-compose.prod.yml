services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build: .
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
