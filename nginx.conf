gzip on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
gzip_min_length 1000;

server {
    listen 80;
    server_name tablasdemultiplicar.xyz www.tablasdemultiplicar.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tablasdemultiplicar.xyz www.tablasdemultiplicar.xyz;

    ssl_certificate     /etc/letsencrypt/live/tablasdemultiplicar.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tablasdemultiplicar.xyz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
